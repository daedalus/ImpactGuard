name: ImpactGuard CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  api-risk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install -r requirements.txt || pip install libcst

    - name: Extract signatures
      run: |
        python extract_signatures.py $(git ls-files '*.py') > new_sigs.json

    - name: Get base signatures
      run: |
        git fetch origin ${{ github.base_ref }} || true
        BASE=$(git merge-base HEAD origin/${{ github.base_ref }} 2>/dev/null || echo "")
        if [ -n "$BASE" ]; then
          git show $BASE:.signatures.json > base_sigs.json 2>/dev/null || echo "[]" > base_sigs.json
        else
          echo "[]" > base_sigs.json
        fi

    - name: Compute diff
      run: |
        python compare_signatures.py base_sigs.json new_sigs.json > diff.txt
        cat diff.txt

    - name: Load runtime data
      run: |
        cp runtime_calls_aggregate.json runtime.json 2>/dev/null || echo "[]" > runtime.json

    - name: Risk analysis
      run: |
        python risk_gate.py diff.txt runtime.json > report.json
        cat report.json

    - name: Show report summary
      run: |
        echo "## API Risk Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the full report from artifacts." >> $GITHUB_STEP_SUMMARY
        jq -r '.[] | select(.risk=="HIGH") | "- 🔴 \(.function)"' report.json >> $GITHUB_STEP_SUMMARY || true

    - name: Generate JSON risk report
      run: python generate_report.py report.json

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-risk-report
        path: api_report.html

    - name: Enforce gate
      run: python enforce_gate.py report.json
